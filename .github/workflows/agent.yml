name: Cyber Intelligence Curator

on:
  schedule:
    - cron: "0 12 * * 1"

  workflow_dispatch:

jobs:
  run-agent:

    runs-on: ubuntu-latest

    steps:

    - name: checkout
      uses: actions/checkout@v3

    - name: setup python
      uses: actions/setup-python@v4
      with:
        python-version: 3.10

    - name: install libraries
      run: |
        pip install requests beautifulsoup4 pyyaml

    - name: run scraper
      run: python scraper.py

    - name: remove duplicates
      run: python deduplicator.py

    - name: create newsletter prompt
      run: python newsletter.py

    - name: commit result
      run: |
        git config --global user.name "cyber-agent"
        git config --global user.email "agent@github.com"
        git add .
        git commit -m "weekly cyber intel update"
        git push

name: Cyber News Agent

on:
  schedule:
    - cron: '0 8 * * 1'

jobs:
  run-agent:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - name: setup python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - run: pip install requests beautifulsoup4 pyyaml

      - run: python scraper.py
      - run: python deduplicator.py
      - run: python newsletter.py

name: Cyber Intelligence Curator

on:
  workflow_dispatch:
  schedule:
    - cron: '0 10 * * 1'

jobs:

  run_agent:

    runs-on: ubuntu-latest

    steps:

      - name: checkout repository
        uses: actions/checkout@v3

      - name: setup python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: install libraries
        run: |
          pip install requests beautifulsoup4 pyyaml

      - name: run scraper
        run: python scraper.py

      - name: remove duplicates
        run: python deduplicator.py

      - name: classify news
        run: python classifier.py

      - name: build newsletter prompt
        run: python newsletter.py

      - name: commit results
        run: |
          git config --global user.name "cyber-agent"
          git config --global user.email "agent@github.com"
          git add .
          git commit -m "weekly cyber intel update"
          git push
